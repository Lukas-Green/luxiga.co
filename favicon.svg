<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lx-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4FF53" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C4FF53" stop-opacity="0"/>
    </linearGradient>
    <filter id="lx-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <clipPath id="lx-shape">
      <path d="M24 80C24 38.6 58.6 4 100 4h312c41.4 0 76 34.6 76 76v312c0 41.4-34.6 76-76 76H100c-41.4 0-76-34.6-76-76V80z"/>
    </clipPath>
  </defs>

  <!-- Base shape: rounded square with corner cuts -->
  <path d="M4 90C4 40.3 44.3 0 94 0h324c49.7 0 90 40.3 90 90v332c0 49.7-40.3 90-90 90H94c-49.7 0-90-40.3-90-90V90z" fill="#080810"/>
  <path d="M4 90C4 40.3 44.3 0 94 0h324c49.7 0 90 40.3 90 90v332c0 49.7-40.3 90-90 90H94c-49.7 0-90-40.3-90-90V90z" fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Corner cut accents -->
  <path d="M4 90L50 4" stroke="#C4FF53" stroke-width="1.5" stroke-opacity="0.3"/>
  <path d="M508 422l-46 86" stroke="#C4FF53" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Glow behind monogram -->
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="url(#lx-glow)" filter="url(#lx-blur)"/>

  <!-- LX Monogram -->
  <!-- L vertical -->
  <path d="M148 136v240h60v-240z" fill="#C4FF53" opacity="0.08"/>
  <path d="M148 136v240" stroke="#C4FF53" stroke-width="36" stroke-linecap="round"/>
  <!-- L horizontal -->
  <path d="M148 376h80" stroke="#C4FF53" stroke-width="36" stroke-linecap="round"/>

  <!-- X formed with two strokes — the cross creates the UX connection -->
  <path d="M270 152l100 208" stroke="#C4FF53" stroke-width="32" stroke-linecap="round"/>
  <path d="M370 152l-100 208" stroke="#C4FF53" stroke-width="32" stroke-linecap="round"/>

  <!-- X center glow pulse -->
  <circle cx="320" cy="256" r="24" fill="#C4FF53" opacity="0.15"/>
  <circle cx="320" cy="256" r="12" fill="#C4FF53" opacity="0.25"/>

  <!-- Family accent line — thin horizontal rule -->
  <line x1="80" y1="440" x2="432" y2="440" stroke="#C4FF53" stroke-width="2" stroke-opacity="0.35"/>
</svg>
