<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="lx-at-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4FF53" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C4FF53" stop-opacity="0"/>
    </linearGradient>
    <filter id="lx-at-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Base — iOS clips to its own shape so fill full rect -->
  <rect width="180" height="180" rx="0" fill="#080810"/>

  <!-- Subtle glow -->
  <ellipse cx="90" cy="90" rx="50" ry="50" fill="url(#lx-at-glow)" filter="url(#lx-at-blur)"/>

  <!-- L -->
  <path d="M48 44v92h28" stroke="#C4FF53" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- X -->
  <path d="M96 48l44 88" stroke="#C4FF53" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M140 48l-44 88" stroke="#C4FF53" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- X center glow -->
  <circle cx="118" cy="92" r="8" fill="#C4FF53" opacity="0.2"/>
  <circle cx="118" cy="92" r="4" fill="#C4FF53" opacity="0.35"/>

  <!-- Family accent line -->
  <line x1="28" y1="156" x2="152" y2="156" stroke="#C4FF53" stroke-width="1.5" stroke-opacity="0.35"/>
</svg>
